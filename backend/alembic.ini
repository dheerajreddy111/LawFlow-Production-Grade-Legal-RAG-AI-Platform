# Alembic configuration for LawFlow.
#
# Schema migrations replace Base.metadata.create_all on the production
# startup path. Tests still use create_all for speed (a dedicated
# migration smoke test exercises this config — see
# backend/tests/test_migrations.py).
#
# The DB URL is *not* hardcoded here — env.py reads it from
# ``app.config.settings.database_url`` so a single source of truth
# governs both runtime and migrations.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
# Filename template uses a short hash + slug so a `git diff` of a new
# migration is human-readable.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Alembic 1.13+ supports timezone-aware revision timestamps.
timezone = UTC

[post_write_hooks]
# Intentionally empty — no Black/isort dance during migration generation.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
